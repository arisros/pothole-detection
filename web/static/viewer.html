<body>

<script>
  (function () {
    const btn = document.getElementById("menuBtn"), nav = document.getElementById("nav");
    const setOpen = (o) => { nav.classList.toggle("open", o); btn.setAttribute("aria-expanded", o); };
    btn.addEventListener("click", (e) => { e.stopPropagation(); setOpen(!nav.classList.contains("open")); });
    nav.querySelectorAll("a").forEach((a) => a.addEventListener("click", () => setOpen(false)));
    document.addEventListener("click", (e) => {
      if (nav.classList.contains("open") && !nav.contains(e.target) && e.target !== btn) setOpen(false);
    });
  })();
</script>

<div class="wrap docwrap">
  <nav class="sidenav">
    <a href="viewer.html?doc=00-ringkasan">00 · Ringkasan</a>
    <a href="viewer.html?doc=01-arsitektur">01 · Arsitektur</a>
    <a href="viewer.html?doc=02-forward-pass">02 · Forward</a>

    <a href="viewer.html?doc=04-training-loop">04 · Training</a>

  </nav>
  <article class="md" id="content"><div class="spinner">memuat…</div></article>
</div>

<script>
window.MathJax = {
  tex: { inlineMath: [["$", "$"]], displayMath: [["$$", "$$"]] },
  options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script>
mermaid.initialize({ startOnLoad: false, theme: "base",
  flowchart: { useMaxWidth: true, htmlLabels: true, nodeSpacing: 45, rankSpacing: 55 },
  themeVariables: {
  fontFamily: "JetBrains Mono, monospace", fontSize: "15px",
  primaryColor: "#fffdf8", primaryTextColor: "#211d17", primaryBorderColor: "#cabfa4",
  lineColor: "#7a7264", secondaryColor: "#efe8d9" } });

const params = new URLSearchParams(location.search);
const doc = (params.get("doc") || "00-ringkasan").replace(/[^a-z0-9_-]/gi, "");
// tandai tab dokumen yang sedang dibuka + geser ke sana pada chip-bar mobile
document.querySelectorAll(".sidenav a").forEach((a) => {
  if ((a.getAttribute("href") || "").endsWith("doc=" + doc)) {
    a.classList.add("active");
    requestAnimationFrame(() => a.scrollIntoView({ inline: "center", block: "nearest" }));
  }
});

function protectMath(src) {
  const store = [];
  src = src.replace(/\$\$[\s\S]*?\$\$/g, (m) => { store.push(m); return "@@M" + (store.length-1) + "@@"; });
  src = src.replace(/\$[^\$\n]+?\$/g,   (m) => { store.push(m); return "@@M" + (store.length-1) + "@@"; });
  return { src, store };
}
const restoreMath = (h, s) => h.replace(/@@M(\d+)@@/g, (_, i) => s[+i]);

fetch("content/" + doc + ".md")
  .then((r) => { if (!r.ok) throw new Error("dokumen tidak ditemukan"); return r.text(); })
  .then((raw) => {
    const { src, store } = protectMath(raw);
    let html = marked.parse(src, { gfm: true });
    const el = document.getElementById("content");
    el.innerHTML = restoreMath(html, store);
    el.querySelectorAll("img").forEach((img) =>
      img.setAttribute("src", "figures/" + (img.getAttribute("src") || "").split("/").pop()));
    el.querySelectorAll("a").forEach((a) => {
      const h = a.getAttribute("href") || "";
      if (h.endsWith(".md")) a.setAttribute("href", "viewer.html?doc=" + h.split("/").pop().replace(/\.md$/, ""));
    });
    // Tandai blockquote callout awam ("💡") / cara-baca-rumus ("📐") untuk gaya khusus.
    el.querySelectorAll("blockquote").forEach((bq) => {
      const t = (bq.textContent || "").replace(/^\s+/, "");
      if (t.startsWith("💡")) bq.classList.add("callout", "callout-tip");
      else if (t.startsWith("📐")) bq.classList.add("callout", "callout-math");
    });
    el.querySelectorAll("code.language-mermaid").forEach((c) => {
      const d = document.createElement("div"); d.className = "mermaid"; d.textContent = c.textContent;
      c.closest("pre").replaceWith(d);
    });
    // Bungkus pasangan kode ↔ diagram: ":::pair Judul" ... blok kode + blok mermaid ... ":::"
    // Desktop tampil side-by-side; layar sempit jadi tab (Kode/Diagram).
    el.querySelectorAll("p").forEach((p) => {
      const t = (p.textContent || "").trim();
      if (!t.startsWith(":::pair")) return;
      const cap = t.slice(7).trim();
      const between = [];
      let n = p.nextElementSibling, closer = null;
      while (n) {
        if (n.tagName === "P" && n.textContent.trim() === ":::") { closer = n; break; }
        between.push(n); n = n.nextElementSibling;
      }
      const pre = between.find((x) => x.tagName === "PRE");
      const dia = between.find((x) => x.classList && x.classList.contains("mermaid"));
      if (!pre || !dia) return;               // butuh kode DAN diagram
      const fig = document.createElement("figure"); fig.className = "codepair";
      if (cap) { const fc = document.createElement("figcaption"); fc.textContent = cap; fig.appendChild(fc); }
      const tabs = document.createElement("div"); tabs.className = "cp-tabs";
      const mk = (label, key, on) => { const b = document.createElement("button");
        b.className = "cp-tab" + (on ? " active" : ""); b.textContent = label; b.dataset.t = key;
        tabs.appendChild(b); return b; };
      const bCode = mk("Kode", "code", true), bDia = mk("Diagram", "diagram", false);
      fig.appendChild(tabs);
      const body = document.createElement("div"); body.className = "cp-body";
      const pc = document.createElement("div"); pc.className = "cp-panel cp-code active"; pc.appendChild(pre);
      const pd = document.createElement("div"); pd.className = "cp-panel cp-diagram"; pd.appendChild(dia);
      body.appendChild(pc); body.appendChild(pd); fig.appendChild(body);
      p.replaceWith(fig);
      between.forEach((x) => { if (x !== pre && x !== dia && x.parentNode) x.remove(); });
      if (closer) closer.remove();
      [bCode, bDia].forEach((btn) => btn.addEventListener("click", () => {
        tabs.querySelectorAll(".cp-tab").forEach((b) => b.classList.toggle("active", b === btn));
        pc.classList.toggle("active", btn.dataset.t === "code");
        pd.classList.toggle("active", btn.dataset.t === "diagram");
      }));
    });
    // Sorot sintaks kode (mermaid sudah jadi div, jadi hanya blok kode asli).
    if (window.hljs) el.querySelectorAll("pre code").forEach((c) => {
      try { window.hljs.highlightElement(c); } catch (e) { /* abaikan */ }
    });
    mermaid.run({ querySelector: ".mermaid" });
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]);
    document.title = doc + " — pothole·cnn";
  })
  .catch((e) => { document.getElementById("content").innerHTML =
    '<p style="color:var(--orange)">Gagal memuat: ' + e.message + "</p>"; });
</script>
</body>
</html>
